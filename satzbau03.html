<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satzbau-Master: Russisch</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --correct: #00b894;
            --wrong: #d63031;
            --solution: #e67e22;
            --bg: #f7f9fc;
            --tile-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header { text-align: center; max-width: 600px; margin-bottom: 20px; }
        
        .game-container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .sentence-area {
            min-height: 100px;
            border-bottom: 2px dashed #ddd;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start;
            padding: 10px;
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            min-height: 80px;
        }

        .tile {
            background: var(--tile-bg);
            border: 2px solid var(--secondary);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            user-select: none;
        }

        .tile:hover { transform: translateY(-2px); border-color: var(--primary); }
        .tile:active { transform: scale(0.95); }
        .tile.selected { opacity: 0.3; pointer-events: none; }

        .controls {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-check { background: var(--primary); color: white; grid-column: span 2; }
        .btn-reset { background: #dfe6e9; color: #2d3436; }
        .btn-solution { background: #fab1a0; color: #2d3436; }
        
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .feedback {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
            min-height: 24px;
        }

        .progress { margin-top: 15px; color: #636e72; font-size: 0.9rem; text-align: center;}

        #result-screen { display: none; text-align: center; }

        @media (max-width: 480px) {
            .tile { padding: 8px 12px; font-size: 1rem; }
            .game-container { padding: 15px; }
            .controls { grid-template-columns: 1fr; }
            .btn-check { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="header" id="header-ui">
    <h2 style="color: var(--primary)">Satzbau-Baukasten</h2>
    <p>Bilde den richtigen Satz durch Anklicken der Wörter.</p>
</div>

<div class="game-container" id="main-ui">
    <div class="sentence-area" id="target-area"></div>

    <div class="word-pool" id="pool-area"></div>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
        <button class="btn-reset" onclick="resetSentence()">Zurücksetzen</button>
        <button class="btn-solution" id="solution-btn" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn-check" id="check-btn" onclick="checkAnswer()" disabled>Prüfen</button>
    </div>

    <div class="progress">Satz <span id="current-num">1</span> / 10</div>
</div>

<div class="game-container" id="result-screen">
    <h2>Übung beendet!</h2>
    <p>Gut gemacht! Du hast alle Sätze bearbeitet.</p>
    <button class="btn-check" style="grid-column: span 1;" onclick="location.reload()">Nochmal spielen</button>
</div>

<script>
    const allSentences = [
        ["Я", "учусь", "в", "университете"],
        ["Я", "учу", "русский", "язык"],
        ["Мы", "договорились", "встретиться", "в", "шесть"],
        ["Я", "встретил", "друга", "в", "метро"],
        ["Маша", "и", "Вася", "встречаются", "давно"],
        ["Мы", "с", "Машей", "дружим", "вместе"],
        ["Я", "хочу", "извиниться", "перед", "тобой"],
        ["Ирина", "учит", "меня", "русскому", "языку"],
        ["Мы", "поссорились", "сегодня", "утром"],
        ["Я", "согласен", "с", "твоим", "мнением"]
    ];

    let currentIdx = 0;
    let selectedWords = [];
    let currentSentence = [];

    const targetArea = document.getElementById('target-area');
    const poolArea = document.getElementById('pool-area');
    const checkBtn = document.getElementById('check-btn');
    const solutionBtn = document.getElementById('solution-btn');
    const feedback = document.getElementById('feedback');

    function init() {
        if (currentIdx >= allSentences.length) {
            showFinal();
            return;
        }
        currentSentence = allSentences[currentIdx];
        selectedWords = [];
        feedback.innerText = "";
        checkBtn.innerText = "Prüfen";
        solutionBtn.disabled = false;
        document.getElementById('current-num').innerText = currentIdx + 1;
        
        let shuffled = [...currentSentence].sort(() => Math.random() - 0.5);
        renderPool(shuffled);
        renderSentence();
    }

    function renderPool(words) {
        poolArea.innerHTML = "";
        words.forEach((word) => {
            const tile = document.createElement('div');
            tile.className = "tile";
            tile.innerText = word;
            tile.onclick = () => selectWord(word, tile);
            poolArea.appendChild(tile);
        });
    }

    function renderSentence(isSolution = false) {
        targetArea.innerHTML = "";
        selectedWords.forEach((word, index) => {
            const tile = document.createElement('div');
            tile.className = "tile";
            tile.style.borderColor = isSolution ? "var(--solution)" : "var(--primary)";
            tile.innerText = word;
            if (!isSolution) {
                tile.onclick = () => unselectWord(index);
            }
            targetArea.appendChild(tile);
        });
        checkBtn.disabled = selectedWords.length !== currentSentence.length;
    }

    function selectWord(word, tileElement) {
        selectedWords.push(word);
        tileElement.classList.add('selected');
        renderSentence();
    }

    function unselectWord(index) {
        const word = selectedWords[index];
        selectedWords.splice(index, 1);
        const poolTiles = poolArea.getElementsByClassName('tile');
        for (let t of poolTiles) {
            if (t.innerText === word && t.classList.contains('selected')) {
                t.classList.remove('selected');
                break;
            }
        }
        renderSentence();
        feedback.innerText = "";
    }

    function resetSentence() {
        selectedWords = [];
        const poolTiles = poolArea.getElementsByClassName('tile');
        for (let t of poolTiles) t.classList.remove('selected');
        renderSentence();
        feedback.innerText = "";
        solutionBtn.disabled = false;
    }

    function showSolution() {
        selectedWords = [...currentSentence];
        const poolTiles = poolArea.getElementsByClassName('tile');
        for (let t of poolTiles) t.classList.add('selected');
        renderSentence(true);
        feedback.style.color = "var(--solution)";
        feedback.innerText = "Lösung angezeigt. Klicke auf 'Weiter'.";
        checkBtn.innerText = "Weiter";
        checkBtn.disabled = false;
        solutionBtn.disabled = true;
    }

    function checkAnswer() {
        const isCorrect = selectedWords.join(' ') === currentSentence.join(' ');
        
        if (isCorrect || checkBtn.innerText === "Weiter") {
            feedback.style.color = "var(--correct)";
            feedback.innerText = isCorrect ? "Richtig! ✓" : "";
            checkBtn.disabled = true;
            setTimeout(() => {
                currentIdx++;
                init();
            }, 1000);
        } else {
            feedback.style.color = "var(--wrong)";
            feedback.innerText = "Das ist nicht die richtige Reihenfolge.";
        }
    }

    function showFinal() {
        document.getElementById('header-ui').style.display = 'none';
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }

    init();
</script>

</body>
</html>
